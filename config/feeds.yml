# National / regional event sources for the aggregator.
#
# Each source:
#   name     -- short label. Stored on every event we create
#                (extendedProperties.private.sourceName) and used for logging.
#                CHANGING A NAME ORPHANS THAT SOURCE'S EXISTING EVENTS -- they
#                will be deleted and recreated on the next run. Rename sparingly.
#   type     -- "ical" (any .ics URL) or "gcal" (public Google Calendar ID)
#   url      -- the .ics URL, or the calendar ID for type: gcal
#   enabled  -- false parks a source without deleting the entry. Note: disabling
#               a source removes its events from the calendar on the next run.
#   region   -- free-text tag appended to the event description ("National",
#               "Kansas", "Midwest", ...). Optional.
#   filter   -- name of a shared rule from the 'filters:' block below.
#   include  -- extra keywords; an event is kept only if it matches at least one
#               (merged with the named filter's any_of).
#   exclude  -- extra keywords; an event is dropped if it matches any
#               (merged with the named filter's none_of).
#
# include/exclude are matched case-insensitively against the event's title,
# description AND location. Location matters: a Zoom or Meet link is often the
# only place an event announces that it is attendable from another chapter.
#
# Every feed below was fetched and inspected on 2026-07-22. See
# docs/dsa-calendar-feeds.md for the full survey, and docs/check_feeds.py to
# re-run the check.

# --------------------------------------------------------------------------
# Shared filter rules
# --------------------------------------------------------------------------
filters:

  # NOT CURRENTLY USED by any source -- every enabled feed is a national body
  # or a neighbour worth seeing in full. Kept because it is the right tool if a
  # distant chapter is ever added: reference it with `filter: remote_or_open`.
  #
  # For chapters too far away to attend in person. Keeps an event only if it
  # looks joinable remotely or explicitly open beyond its own chapter, then
  # drops the internal governance meetings that match anyway.
  #
  # Tune this list rather than editing sources one by one. If regional events
  # feel too sparse, add terms to any_of; too noisy, add to none_of.
  remote_or_open:
    any_of:
      # Joinable remotely -- usually found in the location field.
      - "zoom.us"
      - "zoom link"
      - "zoom"
      - "meet.google.com"
      - "google meet"
      - "teams.microsoft.com"
      - "discord.gg"
      - "livestream"
      - "live stream"
      - "webinar"
      - "online"
      - "virtual"
      - "remote"
      - "hybrid"
      # Explicitly open beyond the hosting chapter.
      - "open to all"
      - "open to the public"
      - "all are welcome"
      - "all chapters"
      - "cross-chapter"
      - "nationwide"
      - "national call"
      - "region-wide"
      - "statewide"
    none_of:
      # Another chapter's internal business, remote or not. Being on Zoom does
      # not make a working-group call relevant to Flint Hills, and measured
      # against the live feeds this is what most of the volume actually is:
      # without these exclusions the ten distant chapters contribute 845 events,
      # with them 149.
      - "members only"
      - "working group"
      - "committee"
      - "caucus"
      - "branch meeting"
      - "steering"
      - "administrative"
      - "operations"
      - "check-in"
      - "check in"
      - "orientation"
      - "onboarding"
      - "office hours"
      - "leadership"
      - "coordinating"
      # Another chapter's own membership meetings.
      - "general body"
      - "general meeting"
      - "membership meeting"
      - "chapter meeting"
      - "officer"
      # Local legwork nobody is travelling for.
      - "tabling"
      - "canvass"
      - "turf"
      - "phone bank"
      - "phonebank"
      - "text bank"
      - "cancelled"
      - "canceled"

sources:

  # --- National bodies -----------------------------------------------------
  # Unfiltered: everything these publish is national by definition. Both were
  # idle when checked (NPEC's last event was 2026-07-15) and will populate
  # whenever they schedule something.

  - name: "DSA Political Education (NPEC)"
    type: "gcal"
    url: "c_gr6govkt050e25nj4a4ldp2bu0@group.calendar.google.com"
    enabled: true
    region: "National"

  - name: "YDSA"
    type: "gcal"
    url: "c_a7c8f7ab3c2ec42eebab1d00670f2be57281dff6350c70cc1ccd6d6086733be4@group.calendar.google.com"
    enabled: true
    region: "National"

  # --- Kansas neighbors ----------------------------------------------------
  # Unfiltered: close enough that an in-person event is a real option.

  - name: "Lawrence DSA"
    type: "gcal"
    url: "dsalawrenceks@gmail.com"
    enabled: true
    region: "Kansas"

  - name: "Wichita DSA"
    type: "gcal"
    url: "socialists@ictdsa.org"
    enabled: true
    region: "Kansas"

  # Calendar ID is not linked anywhere obvious: it is embedded in the page
  # builder's serialised blob on sekdsa.org/event-calendar.
  - name: "Southeast Kansas DSA"
    type: "gcal"
    url: "southeastksdsa@gmail.com"
    enabled: true
    region: "Kansas"

  # --- Nebraska ------------------------------------------------------------
  # dsanebraska.org runs one calendar for the state; its feed carries joint
  # "Lincoln and Omaha DSA" events, so this single source covers both cities.

  - name: "Nebraska DSA (Lincoln / Omaha)"
    type: "gcal"
    url: "8f7b2f4aff1da8f0fb3c6818e4f186a0040bf8e077a9bd0d2cb3b457074fe211@group.calendar.google.com"
    enabled: true
    region: "Nebraska"

  # --- Do not enable as-is -------------------------------------------------
  # Kansas City DSA: https://kcdsa.org/wp-json/r34icspro/v5/ics/9c37159db5ce114ddfce208403ae2dfd4995d529
  #   Returns a well-formed calendar containing zero events. Worth asking KC
  #   about directly -- they clearly mean to publish a feed.
  # Topeka DSA: topekadsa@gmail.com
  #   44 events in the horizon, every one titled "Busy". The calendar is shared
  #   free/busy-only, so no titles, locations or descriptions come through.
  #   Ask them to switch sharing to "See all event details".
  # Salina DSA: linktr.ee/dsa.salina -- Linktree only, no calendar of any kind.
  # Oklahoma: there is no statewide chapter. Oklahoma City (okcdsa.org) and
  #   Green Country/Tulsa are separate, and neither publishes a feed; OKC
  #   organises through Action Network.
  # Housing Justice Commission: https://housing.dsausa.org/events/?ical=1
  #   HTTP 403. May be bot protection that behaves differently from a GitHub
  #   runner -- if you want it, enable it and read one run's log before trusting.
  # Oklahoma City DSA: okcdsa.org has no events or calendar page at all (both
  #   /events/ and /calendar/ return 404) and runs no calendar plugin.
  # Omaha DSA: omahadsa.org is a Hugo site that embeds its events as inline
  #   JSON for FullCalendar -- no subscribable feed. The Nebraska DSA calendar
  #   above already carries the joint Lincoln/Omaha events.
  # DSA Los Angeles, East Bay, Columbus, Milwaukee, Madison, North NJ, Metro DC,
  #   Southern NH, Tampa: all broken as of 2026-07-22.
  # Larger chapters (Chicago, Twin Cities, Denver, Cleveland, Austin, Houston,
  #   New Orleans) have working feeds listed in docs/dsa-calendar-feeds.md. They
  #   are deliberately absent: measured live they carry 1,697 events over the
  #   horizon, nearly all internal committee and working-group calls.
