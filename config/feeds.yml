# National / regional event sources for the aggregator.
#
# Each source:
#   name     -- short label. Stored on every event we create
#                (extendedProperties.private.sourceName) and used for logging.
#                CHANGING A NAME ORPHANS THAT SOURCE'S EXISTING EVENTS -- they
#                will be deleted and recreated on the next run. Rename sparingly.
#   type     -- "ical" (any .ics URL) or "gcal" (public Google Calendar ID)
#   url      -- the .ics URL, or the calendar ID for type: gcal
#   enabled  -- false parks a source without deleting the entry. Note: disabling
#               a source removes its events from the calendar on the next run.
#   region   -- free-text tag appended to the event description ("National",
#               "Kansas", "Midwest", ...). Optional.
#   filter   -- name of a shared rule from the 'filters:' block below.
#   include  -- extra keywords; an event is kept only if it matches at least one
#               (merged with the named filter's any_of).
#   exclude  -- extra keywords; an event is dropped if it matches any
#               (merged with the named filter's none_of).
#
# include/exclude are matched case-insensitively against the event's title,
# description AND location. Location matters: a Zoom or Meet link is often the
# only place an event announces that it is attendable from another chapter.
#
# Every feed below was fetched and inspected on 2026-07-22. See
# docs/dsa-calendar-feeds.md for the full survey, and docs/check_feeds.py to
# re-run the check.

# --------------------------------------------------------------------------
# Shared filter rules
# --------------------------------------------------------------------------
filters:

  # For chapters too far away to attend in person. Keeps an event only if it
  # looks joinable remotely or explicitly open beyond its own chapter, then
  # drops the internal governance meetings that match anyway.
  #
  # Tune this list rather than editing sources one by one. If regional events
  # feel too sparse, add terms to any_of; too noisy, add to none_of.
  remote_or_open:
    any_of:
      # Joinable remotely -- usually found in the location field.
      - "zoom.us"
      - "zoom link"
      - "zoom"
      - "meet.google.com"
      - "google meet"
      - "teams.microsoft.com"
      - "discord.gg"
      - "livestream"
      - "live stream"
      - "webinar"
      - "online"
      - "virtual"
      - "remote"
      - "hybrid"
      # Explicitly open beyond the hosting chapter.
      - "open to all"
      - "open to the public"
      - "all are welcome"
      - "all chapters"
      - "cross-chapter"
      - "nationwide"
      - "national call"
      - "region-wide"
      - "statewide"
    none_of:
      # Another chapter's internal business, remote or not. Being on Zoom does
      # not make a working-group call relevant to Flint Hills, and measured
      # against the live feeds this is what most of the volume actually is:
      # without these exclusions the ten distant chapters contribute 845 events,
      # with them 149.
      - "members only"
      - "working group"
      - "committee"
      - "caucus"
      - "branch meeting"
      - "steering"
      - "administrative"
      - "operations"
      - "check-in"
      - "check in"
      - "orientation"
      - "onboarding"
      - "office hours"
      - "leadership"
      - "coordinating"
      # Another chapter's own membership meetings.
      - "general body"
      - "general meeting"
      - "membership meeting"
      - "chapter meeting"
      - "officer"
      # Local legwork nobody is travelling for.
      - "tabling"
      - "canvass"
      - "turf"
      - "phone bank"
      - "phonebank"
      - "text bank"
      - "cancelled"
      - "canceled"

