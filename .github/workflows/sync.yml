name: Sync

on:
  schedule:
    # Every 30 minutes. Do not go faster on a private repo (Actions minutes).
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

# Default token stays read-only for the sync job; the keepalive job opts into
# actions:write to re-enable this workflow.
permissions:
  contents: read

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run sync
        run: python -m src.main
        env:
          ACTION_NETWORK_API_KEY: ${{ secrets.ACTION_NETWORK_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}

  # Scheduled workflows are auto-disabled after 60 days of repo inactivity, and
  # this repo commits nothing on its own. This job re-enables THIS workflow on
  # every scheduled run so it never gets suspended. It replaces the formerly
  # recommended gautamkrishnar/keepalive-workflow, which GitHub blocked for ToS.
  # Must live in the workflow it protects; only runs on the schedule trigger.
  keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
