name: Events

# Regenerates events.json for the website from the chapter Google Calendar,
# and commits it back only when it changed.

on:
  schedule:
    # Every 4 hours.
    - cron: '17 */4 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: events
  cancel-in-progress: false

jobs:
  events:
    runs-on: ubuntu-latest
    permissions:
      # Needed only to commit events.json back to the branch.
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      - name: Regenerate events.json
        run: python -m src.events_json
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Commit events.json if it changed
        run: |
          if git diff --quiet -- events.json; then
            echo "events.json unchanged; nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add events.json
          git commit -m "chore: refresh events.json"
          git push

  # Scheduled workflows are auto-disabled after 60 days of repository inactivity.
  # This job re-enables THIS workflow on every scheduled run so the schedule
  # never gets suspended during a quiet stretch.
  keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
