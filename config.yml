# Action Network -> Google Calendar (+ Discord) sync configuration.
# Secrets are NOT here. They come from environment variables / GitHub Actions Secrets:
#   ACTION_NETWORK_API_KEY, GOOGLE_SERVICE_ACCOUNT_JSON, DISCORD_BOT_TOKEN

action_network:
  # The Action Network group whose events we sync. The API token is already
  # scoped to this group, so this is informational / for logging.
  group_id: "4a8788c9a29ef428dec192b4a03f4f4e"

sync:
  # Wall-clock timezone Action Network events are authored in. Action Network
  # stamps times with a bogus trailing "Z" but the values are really local to
  # this zone (see src/action_network.py for the handling).
  default_timezone: "America/Chicago"

  # Used when an event has no end_date. Mandatory for Discord external events.
  default_duration_minutes: 120

  # Sync window: ignore events whose start is more than this many days in the past.
  # All future events are synced.
  past_window_days: 1

  # Only sync events that carry one of the routing hashtags below. Untagged
  # events are ignored entirely.
  only_tagged: true

  # An event may carry more than one routing hashtag; it is written to every
  # mapped calendar.
  multi_tag_fan_out: true

  # What to do when Action Network reports an event status of "cancelled".
  #   cancel -> mark the Google Calendar event's status as "cancelled" (keep it)
  #   delete -> remove the calendar event
  on_cancelled: "cancel"

  # What to do when a previously-synced FUTURE event disappears from the Action
  # Network results (an organizer deleted it upstream).
  #   delete -> remove it from the calendar / Discord
  #   keep   -> leave it in place
  # Past events that simply age out of the sync window are never touched.
  on_disappeared: "delete"

# Routing map: hashtag (written as "#name" in the Action Network event
# description) -> Google Calendar ID. Match is case-insensitive.
routing:
  civic:     "559e1e8d26981990f00982fb8c5ee45b3c5e132f473e0e9ba960d55065f7ba35@group.calendar.google.com"
  housing:   "4dd16328b66b68b0dd26b7775b5ae179825bd8bea72c6a32ff3ae29d022f0014@group.calendar.google.com"
  meeting:   "7f716bf45bbd00dde252ce301f3d5a62929defbf7cc7851e9f9349ab6cda02a7@group.calendar.google.com"
  outreach:  "61ecc660c510331a81deb244d97b23aafded8c8cdc2cd4f2c86241cd6da8e467@group.calendar.google.com"
  action:    "953083c51614a8f0e449b69dab8859ecf6a6c5c99f6c091edd76dbed0645a72c@group.calendar.google.com"
  education: "3346afb2b8c06a994f16867d7a2a1bfec5e874aeae80a36ef1b009061e75adf0@group.calendar.google.com"
  social:    "a3ecd66f17493e5a02117246345c48d2a0bfa2aa729edd5e256f52494da6f636@group.calendar.google.com"

discord:
  enabled: true
  guild_id: "1100839736991555665"
  # All synced events go into this one server regardless of tag.
